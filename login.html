<!DOCTYPE html>
<html lang="en" dir="ltr" id="login-html">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title data-i18n="login.title">نحلل الرسائل - SMS Gateway</title>
  <link rel="stylesheet" href="assets/fonts/font-awesome/css/all.min.css">
  <link rel="stylesheet" href="assets/css/root.css">
  <script>(function(){var t=localStorage.getItem('theme')||'dark';document.documentElement.className=document.documentElement.className.replace(/\b(dark|light)\b/g,'').trim();document.documentElement.classList.add(t)})();</script>
  <style>
    html {
      background-color: #0d0d0e !important;
      background: #0d0d0e !important;
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Noto Sans Arabic', 'Segoe UI', Tahoma, sans-serif;
      background: radial-gradient(circle at center, #1c1808 0%, #0d0d0e 80%) !important;
      color: #f5f5f7 !important;
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100vh;
      overflow: hidden;
      position: relative;
    }

    .bg-glow-1 {
      position: absolute;
      width: 250px;
      height: 250px;
      background: radial-gradient(circle, rgba(255, 204, 0, 0.15) 0%, transparent 70%) !important;
      top: 20%;
      left: 15%;
      z-index: 1;
      filter: blur(40px);
      animation: floatGlow 8s infinite alternate ease-in-out;
    }

    .bg-glow-2 {
      position: absolute;
      width: 300px;
      height: 300px;
      background: radial-gradient(circle, rgba(255, 153, 0, 0.12) 0%, transparent 70%) !important;
      bottom: 15%;
      right: 10%;
      z-index: 1;
      filter: blur(50px);
      animation: floatGlow 10s infinite alternate-reverse ease-in-out;
    }

    @keyframes floatGlow {
      0% { transform: translateY(0) scale(1); }
      100% { transform: translateY(-20px) scale(1.1); }
    }

    .login-container {
      background-color: rgba(18, 18, 20, 0.75) !important;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      padding: 35px 30px;
      border-radius: 24px;
      border: 1px solid rgba(255, 204, 0, 0.15) !important;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6), inset 0 1px 2px rgba(255, 255, 255, 0.05);
      width: 90%;
      max-width: 380px;
      text-align: center;
      z-index: 10;
      transition: all 0.3s ease;
    }

    .login-container:hover {
      border-color: rgba(255, 204, 0, 0.3) !important;
      box-shadow: 0 25px 60px rgba(255, 204, 0, 0.05), 0 20px 50px rgba(0, 0, 0, 0.7);
    }

    .logo-section {
      margin-bottom: 10px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .logo-img {
      width: 72px;
      height: 72px;
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      background: linear-gradient(135deg, #ffcc00, #ff9900);
      color: #0b0a02;
      border: 2px solid rgba(255, 204, 0, 0.6);
      box-shadow: 0 8px 24px rgba(255, 204, 0, 0.3);
      animation: logoPulse 4s infinite alternate;
    }

    @keyframes logoPulse {
      0% { transform: scale(1); box-shadow: 0 8px 24px rgba(255, 204, 0, 0.25); }
      100% { transform: scale(1.05); box-shadow: 0 12px 30px rgba(255, 204, 0, 0.45); }
    }

    .app-name {
      font-size: 1.6rem;
      font-weight: 800;
      margin: 0;
      letter-spacing: 0.5px;
      background: linear-gradient(135deg, #ffffff 30%, #e0e0e0 70%, #ffcc00 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .app-tagline {
      font-size: 0.8rem;
      color: #9e9e9e !important;
      margin: -5px 0 0 0;
      letter-spacing: 0.5px;
    }

    .welcome-text {
      font-size: 0.92rem;
      color: #ccc;
      margin: 8px 0 20px;
      line-height: 1.6;
    }

    .welcome-text .wave {
      display: inline-block;
      animation: wave 1.5s infinite;
      transform-origin: 70% 70%;
    }

    .lang-toggle {
      position: relative;
      z-index: 20;
      display: flex;
      flex-direction: row;
      direction: ltr;
      gap: 0;
      background: rgba(255,255,255,0.06);
      border-radius: 10px;
      padding: 3px;
      border: 1px solid rgba(255,255,255,0.08);
      width: fit-content;
      margin: 0 auto 10px;
      overflow: hidden;
    }

    .lang-toggle button {
      position: relative;
      background: transparent;
      border: none;
      color: #999;
      font-size: 0.75rem;
      font-weight: 600;
      padding: 5px 14px;
      border-radius: 8px;
      cursor: pointer;
      transition: color 0.3s;
      font-family: inherit;
      z-index: 1;
    }

    .lang-toggle .slider {
      position: absolute;
      top: 3px;
      left: 3px;
      width: calc(50% - 3px);
      height: calc(100% - 6px);
      background: linear-gradient(135deg, #ffcc00, #ff9900);
      border-radius: 8px;
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .lang-toggle.ar .slider {
      transform: translateX(100%);
    }

    .lang-toggle.en .slider {
      transform: translateX(0);
    }

    .lang-toggle button.active {
      color: #0b0a02;
    }

    @keyframes wave {
      0%, 60%, 100% { transform: rotate(0deg); }
      10% { transform: rotate(14deg); }
      20% { transform: rotate(-8deg); }
      30% { transform: rotate(14deg); }
      40% { transform: rotate(-4deg); }
      50% { transform: rotate(10deg); }
      60% { transform: rotate(0deg); }
    }

    .input-group {
      margin-bottom: 22px;
      text-align: right;
    }

    .input-group label {
      display: block;
      margin-bottom: 8px;
      font-size: 13px;
      font-weight: 500;
      color: #d1d1d6 !important;
      padding-right: 4px;
    }

    .input-wrapper {
      position: relative;
      display: flex;
      align-items: center;
    }

    .input-wrapper i {
      position: absolute;
      right: 14px;
      color: #777;
      font-size: 1.1rem;
      transition: color 0.3s;
    }

    .input-wrapper input {
      width: 100%;
      padding: 13px 45px 13px 15px;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.08) !important;
      background-color: rgba(255, 255, 255, 0.04) !important;
      color: white !important;
      box-sizing: border-box;
      outline: none;
      font-size: 0.95rem;
      transition: all 0.3s ease;
      font-family: inherit;
    }

    .input-wrapper input:focus {
      border-color: rgba(255, 204, 0, 0.6) !important;
      background-color: rgba(255, 255, 255, 0.07) !important;
      box-shadow: 0 0 12px rgba(255, 204, 0, 0.15) !important;
    }

    .input-wrapper input:focus + i {
      color: #ffcc00 !important;
    }

    button[type="submit"] {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      border: none;
      background: linear-gradient(135deg, #ffcc00, #ff9900) !important;
      color: #0b0a02 !important;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 4px 15px rgba(255, 204, 0, 0.2);
      font-family: inherit;
      margin-top: 10px;
    }

    button[type="submit"]:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(255, 204, 0, 0.4);
      opacity: 0.95;
    }

    button[type="submit"]:active {
      transform: translateY(1px);
    }

    button[type="submit"]:disabled {
      opacity: 0.7;
      cursor: not-allowed;
      transform: none;
    }

    #error-msg {
      background-color: rgba(239, 68, 68, 0.1) !important;
      border: 1px solid rgba(239, 68, 68, 0.2) !important;
      color: #ef4444 !important;
      font-size: 13px;
      font-weight: 500;
      padding: 10px 12px;
      border-radius: 10px;
      margin-top: 20px;
      display: none;
      align-items: center;
      justify-content: center;
      gap: 8px;
      animation: shakeError 0.4s ease;
    }

    @keyframes shakeError {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-6px); }
      75% { transform: translateX(6px); }
    }

    *,
    ::after,
    ::before {
      box-sizing: border-box;
    }

    .mask-password {
      -webkit-text-security: disc !important;
      text-security: disc !important;
    }

    input:-webkit-autofill,
    input:-webkit-autofill:hover,
    input:-webkit-autofill:focus {
      -webkit-box-shadow: 0 0 0px 1000px #1c1c1e inset !important;
      -webkit-text-fill-color: white !important;
      transition: background-color 5000s ease-in-out 0s;
    }
  </style>
</head>

<body>
  <div class="bg-glow-1"></div>
  <div class="bg-glow-2"></div>

  <div class="login-container">
    <div class="lang-toggle ar" id="lang-toggle" onclick="toggleLoginLang()">
      <div class="slider"></div>
      <button id="lang-en">EN</button>
      <button id="lang-ar">العربية</button>
    </div>
    <div class="logo-section">
      <div class="logo-img">
        <i class="fas fa-sms"></i>
      </div>
      <h1 class="app-name">SMS Gateway</h1>
      <p class="app-tagline" data-i18n="login.tagline">بوابة الرسائل الإلكترونية والجهاز</p>
      <p class="welcome-text"><span class="wave">👋</span> <span data-i18n="login.welcome">مرحباً بك في بوابة الرسائل القصيرة</span></p>
    </div>

    <form id="login-form" autocomplete="off">
      <input type="text" name="fake_user" style="display:none" tabindex="-1">
      <input type="password" name="fake_pass" style="display:none" tabindex="-1">

      <div class="input-group">
        <label for="username" data-i18n="login.username">اسم المستخدم</label>
        <div class="input-wrapper">
          <input type="text" id="username" data-i18n-placeholder="login.username_placeholder" placeholder="اكتب اسم المستخدم" required autocomplete="one-time-code">
          <i class="fas fa-user"></i>
        </div>
      </div>

      <div class="input-group">
        <label for="password" data-i18n="login.password">كلمة المرور</label>
        <div class="input-wrapper">
          <input type="text" id="password" class="mask-password" placeholder="••••••••" required autocomplete="new-password">
          <i class="fas fa-lock"></i>
        </div>
      </div>

      <button type="submit" id="submit-btn" data-i18n="login.submit">نحلل الرسائل</button>
      <div id="error-msg"><i class="fas fa-exclamation-circle"></i> <span data-i18n="login.error_empty">ثبّت أن اسم المستخدم وكلمة المرور</span></div>
    </form>
  </div>

  <script src="/assets/js/i18n.js"></script>
  <script src="assets/js/browserfingerprint.js"></script>

  <script>
    function switchLoginLang(lang) {
      i18n.setLang(lang);
      var tg = document.getElementById('lang-toggle');
      tg.classList.toggle('ar', lang === 'ar');
      tg.classList.toggle('en', lang === 'en');
    }
    function toggleLoginLang() {
      var next = (localStorage.getItem('lang') || 'ar') === 'ar' ? 'en' : 'ar';
      switchLoginLang(next);
    }
    (function () {
      var cur = localStorage.getItem('lang') || 'ar';
      var tg = document.getElementById('lang-toggle');
      tg.classList.toggle('ar', cur === 'ar');
      tg.classList.toggle('en', cur === 'en');
    })();
  </script>

  <script>
    document.getElementById('login-form').onsubmit = async (e) => {
      e.preventDefault();
      const submitBtn = document.getElementById('submit-btn');
      const usernameInput = document.getElementById('username');
      const passwordInput = document.getElementById('password');
      const errorMsg = document.getElementById('error-msg');

      submitBtn.disabled = true;
      submitBtn.innerHTML = t('login.logging_in') + ' <i class="fas fa-circle-notch fa-spin"></i>';
      usernameInput.disabled = true;
      passwordInput.disabled = true;
      errorMsg.style.display = 'none';

      const fp = await FingerprintJS.load();
      const result = await fp.get();
      const user_FP = result.visitorId;
      const hwid = window.electronAPI ? window.electronAPI.getMachineId() : user_FP;

      try {
        const response = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username: usernameInput.value, password: passwordInput.value, hwid })
        });

        const data = await response.json();

        if (data.success) {
          localStorage.setItem('username', data.user.username);
          localStorage.setItem('userId', data.user.id);
          localStorage.setItem('userRole', data.user.role);
          window.location.href = '/';
        } else {
          errorMsg.innerHTML = '<i class="fas fa-exclamation-circle"></i> <span>' + (data.error || t('login.error_failed')) + '</span>';
          errorMsg.style.display = 'flex';
          submitBtn.disabled = false;
          submitBtn.innerHTML = t('login.reset');
          usernameInput.disabled = false;
          passwordInput.disabled = false;
        }
      } catch (err) {
        errorMsg.innerHTML = '<i class="fas fa-exclamation-circle"></i> <span>' + t('login.error_network') + '</span>';
        errorMsg.style.display = 'flex';
        submitBtn.disabled = false;
        submitBtn.innerHTML = t('login.reset2');
        usernameInput.disabled = false;
        passwordInput.disabled = false;
      }
    };
  </script>
</body>

</html>
