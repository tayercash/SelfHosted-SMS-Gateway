<style>
    .lic-loading { display: flex; align-items: center; justify-content: center; padding: 60px 20px; color: var(--text-secondary); gap: 10px; }
    .lic-loading .spinner { width: 24px; height: 24px; border: 3px solid rgba(255,255,255,0.08); border-top-color: #ffcc00; border-radius: 50%; animation: licSpin .7s linear infinite; }
    @keyframes licSpin { to { transform: rotate(360deg); } }
    .lic-error { text-align: center; padding: 40px 20px; color: #ef4444; }
    .lic-refresh-btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 18px; background: rgba(255,204,0,0.1); color: #ffcc00; border: 1.5px solid rgba(255,204,0,0.2); border-radius: 10px; cursor: pointer; font-weight: 600; font-size: 0.85rem; font-family: inherit; transition: all 0.3s; margin-top: 12px; }
    .lic-refresh-btn:hover { background: #ffcc00; color: #000; transform: translateY(-2px); }

    /* Key Hero Card */
    .lic-key-hero {
        background: linear-gradient(135deg, rgba(255,204,0,0.08) 0%, rgba(255,153,0,0.05) 100%);
        border: 1.5px solid rgba(255,204,0,0.2);
        border-radius: 20px;
        padding: 28px 24px;
        margin-bottom: 20px;
        text-align: center;
        position: relative;
        overflow: hidden;
    }
    .lic-key-hero::before {
        content: '';
        position: absolute;
        top: -50%;
        left: -50%;
        width: 200%;
        height: 200%;
        background: radial-gradient(ellipse at center, rgba(255,204,0,0.04) 0%, transparent 70%);
        pointer-events: none;
    }
    .lic-key-hero .key-label {
        font-size: 0.75rem;
        font-weight: 700;
        color: rgba(255,204,0,0.7);
        text-transform: uppercase;
        letter-spacing: 1.5px;
        margin-bottom: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
    }
    .lic-key-hero .key-value {
        font-family: 'Courier New', monospace;
        font-size: 1.25rem;
        font-weight: 800;
        color: #ffcc00;
        letter-spacing: 2px;
        direction: ltr;
        display: inline-flex;
        align-items: center;
        gap: 12px;
        word-break: break-all;
        justify-content: center;
    }
    .lic-key-hero .key-copy {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        padding: 6px 14px;
        background: rgba(255,204,0,0.15);
        color: #ffcc00;
        border: 1px solid rgba(255,204,0,0.3);
        border-radius: 8px;
        cursor: pointer;
        font-size: 0.78rem;
        font-weight: 700;
        font-family: inherit;
        transition: all 0.2s;
        white-space: nowrap;
        flex-shrink: 0;
    }
    .lic-key-hero .key-copy:hover { background: #ffcc00; color: #000; }
    .lic-key-hero .key-status {
        margin-top: 14px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        flex-wrap: wrap;
    }

    /* Status badges */
    .lic-status-badge { display: inline-flex; align-items: center; gap: 5px; padding: 4px 12px; border-radius: 20px; font-size: .75rem; font-weight: 700; }
    .lic-status-badge.active { background: rgba(16,185,129,.12); color: #10b981; border: 1px solid rgba(16,185,129,.25); }
    .lic-status-badge.grace { background: rgba(255,159,67,.12); color: #ff9f43; border: 1px solid rgba(255,159,67,.25); }
    .lic-status-badge.expired { background: rgba(239,68,68,.12); color: #ef4444; border: 1px solid rgba(239,68,68,.25); }
    .lic-status-badge.suspended { background: rgba(239,68,68,.12); color: #ef4444; border: 1px solid rgba(239,68,68,.25); }
    .lic-status-badge.no_license { background: rgba(136,136,136,.08); color: #888; border: 1px solid rgba(136,136,136,.15); }
    .lic-lifetime-badge { display: inline-flex; align-items: center; gap: 5px; padding: 4px 12px; border-radius: 20px; font-size: .75rem; font-weight: 700; background: rgba(16,185,129,.12); color: #10b981; border: 1px solid rgba(16,185,129,.25); }
    .lic-days-badge { font-size: .82rem; color: var(--text-secondary); }
    .lic-days-badge.warn { color: #ff9f43; }
    .lic-days-badge.danger { color: #ef4444; }

    /* Plan Card */
    .lic-plan-card {
        background: rgba(30,30,30,0.4);
        backdrop-filter: blur(15px);
        border: 1px solid rgba(255,255,255,0.05);
        border-radius: 16px;
        padding: 24px;
        margin-bottom: 16px;
    }
    .lic-plan-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 16px;
        flex-wrap: wrap;
        gap: 8px;
    }
    .lic-plan-name {
        font-size: 1.1rem;
        font-weight: 800;
        color: #ffcc00;
        display: flex;
        align-items: center;
        gap: 8px;
    }
    .lic-plan-price {
        font-size: 0.85rem;
        color: var(--text-secondary);
    }
    .lic-plan-limits {
        display: flex;
        gap: 12px;
        margin-bottom: 16px;
    }
    .lic-limit-item {
        flex: 1;
        text-align: center;
        padding: 12px;
        background: rgba(255,255,255,0.02);
        border: 1px solid rgba(255,255,255,0.04);
        border-radius: 12px;
    }
    .lic-limit-item .limit-val {
        font-size: 1.2rem;
        font-weight: 800;
        color: #fff;
    }
    .lic-limit-item .limit-val.unlimited { color: #10b981; }
    .lic-limit-item .limit-lbl {
        font-size: 0.7rem;
        color: var(--text-secondary);
        margin-top: 4px;
    }
    .lic-plan-features {
        list-style: none;
        padding: 0;
        margin: 0;
    }
    .lic-plan-features li {
        padding: 5px 0;
        font-size: 0.82rem;
        color: var(--text-secondary);
        display: flex;
        align-items: center;
        gap: 8px;
    }
    .lic-plan-features li i { color: #10b981; width: 14px; font-size: 0.75rem; }

    /* Info Grid */
    .lic-info-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 16px; margin-bottom: 16px; }
    .lic-info-card {
        background: rgba(30,30,30,0.4);
        backdrop-filter: blur(15px);
        border: 1px solid rgba(255,255,255,0.05);
        border-radius: 16px;
        padding: 20px;
    }
    .lic-card-title { font-size: .8rem; font-weight: 600; color: var(--text-secondary); margin-bottom: 14px; text-transform: uppercase; letter-spacing: .5px; display: flex; align-items: center; gap: 8px; }
    .lic-card-title i { font-size: .9rem; }
    .lic-row { display: flex; justify-content: space-between; align-items: center; padding: 9px 0; font-size: .85rem; }
    .lic-row + .lic-row { border-top: 1px solid rgba(255,255,255,0.04); }
    .lic-row .label { color: var(--text-secondary); }
    .lic-row .value { color: var(--text-primary); font-weight: 600; font-family: monospace; direction: ltr; text-align: right; }
    .lic-row .value.accent { color: #ffcc00; }
    .lic-row .value.green { color: #10b981; }
    .lic-row .value.red { color: #ef4444; }
    .lic-row .value.warn { color: #ff9f43; }

    /* Payments */
    .lic-payments-table { width: 100%; border-collapse: collapse; font-size: .82rem; }
    .lic-payments-table th { text-align: right; padding: 10px 12px; color: var(--text-secondary); font-weight: 600; border-bottom: 1px solid rgba(255,255,255,0.06); font-size: .75rem; text-transform: uppercase; }
    .lic-payments-table td { padding: 10px 12px; color: var(--text-primary); border-bottom: 1px solid rgba(255,255,255,0.03); }
    .lic-payments-table tr:last-child td { border-bottom: none; }
    .lic-payments-table .pay-status { padding: 3px 10px; border-radius: 12px; font-size: .75rem; font-weight: 600; }
    .lic-payments-table .pay-status.completed { background: rgba(16,185,129,.12); color: #10b981; }
    .lic-payments-table .pay-status.pending { background: rgba(255,159,67,.12); color: #ff9f43; }
    .lic-payments-table .pay-status.failed { background: rgba(239,68,68,.12); color: #ef4444; }
    .lic-empty { text-align: center; padding: 20px; color: var(--text-secondary); font-size: .85rem; }

    .lic-renew-btn { display: inline-flex; align-items: center; gap: 6px; padding: 10px 20px; background: linear-gradient(135deg, #ffcc00, #ff9900); color: #000; border: none; border-radius: 10px; font-weight: 700; font-size: .88rem; cursor: pointer; font-family: inherit; transition: all .3s; text-decoration: none; }
    .lic-renew-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 24px rgba(255,204,0,0.35); }

    /* Live Limits Bar */
    .license-limits-bar {
        display: flex;
        align-items: center;
        gap: 14px;
        background: rgba(30,30,30,0.4);
        backdrop-filter: blur(15px);
        border: 1px solid rgba(255,255,255,0.05);
        border-radius: 14px;
        padding: 10px 18px;
        margin-bottom: 16px;
        font-size: .82rem;
    }
    .license-limits-bar .limits-plan { font-weight: 700; color: #ffcc00; white-space: nowrap; }
    .license-limits-bar .limits-divider { width: 1px; height: 22px; background: rgba(255,255,255,0.08); }
    .license-limits-bar .limits-item { display: flex; align-items: center; gap: 6px; color: var(--text-secondary); }
    .license-limits-bar .limits-item .limits-current { font-weight: 700; color: var(--text-primary); }
    .license-limits-bar .limits-bar-track { flex: 1; min-width: 80px; max-width: 180px; height: 6px; background: rgba(255,255,255,.06); border-radius: 3px; overflow: hidden; }
    .license-limits-bar .limits-bar-fill { height: 100%; border-radius: 3px; background: #10b981; transition: width .4s ease; }
    .license-limits-bar .limits-bar-fill.warn { background: #f59e0b; }
    .license-limits-bar .limits-bar-fill.over { background: #ef4444; }
    .license-limits-bar .limits-unlimited { color: #10b981; font-weight: 600; }
</style>

<div style="padding: 16px;">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:10px;">
        <h2 style="margin:0;font-size:1.2rem;font-weight:800;color:var(--text-primary);display:flex;align-items:center;gap:8px;">
            <i class="fas fa-shield-alt"></i> <span data-i18n="license.title">معلومات الترخيص</span>
        </h2>
        <button class="lic-refresh-btn" onclick="loadLicenseInfo()"><i class="fas fa-sync-alt"></i> <span data-i18n="license.refresh">تحديث</span></button>
    </div>
    <div id="license_limits_bar" class="license-limits-bar" style="display:none;">
        <span class="limits-plan" id="limits_plan_name"></span>
        <div class="limits-divider"></div>
        <div class="limits-item">
            <i class="fas fa-plug" style="color:#ffcc00;opacity:.6;"></i>
            <span data-i18n="modems.limit_gateways">Gateways</span>:
            <span class="limits-current" id="limits_gw_current">0</span>
            <span id="limits_gw_max"></span>
            <div class="limits-bar-track" id="limits_gw_track"><div class="limits-bar-fill" id="limits_gw_fill"></div></div>
        </div>
        <div class="limits-divider"></div>
        <div class="limits-item">
            <i class="fas fa-mobile-alt" style="color:#10b981;opacity:.6;"></i>
            <span data-i18n="modems.limit_clients">Clients</span>:
            <span class="limits-current" id="limits_cl_current">0</span>
            <span id="limits_cl_max"></span>
            <div class="limits-bar-track" id="limits_cl_track"><div class="limits-bar-fill" id="limits_cl_fill"></div></div>
        </div>
    </div>
    <div id="lic-content">
        <div class="lic-loading"><div class="spinner"></div> <span data-i18n="license.loading">جاري تحميل معلومات الترخيص...</span></div>
    </div>
</div>

<script>
function loadLicenseInfo() {
    var el = document.getElementById('lic-content');
    el.innerHTML = '<div class="lic-loading"><div class="spinner"></div> <span>' + t('license.loading') + '</span></div>';

    fetch('/api/license-info')
        .then(function(r) { return r.json(); })
        .then(function(d) {
            if (!d.success) {
                el.innerHTML = '<div class="lic-error"><i class="fas fa-exclamation-triangle" style="font-size:2rem;margin-bottom:12px;display:block;"></i>' + (d.error || t('license.error')) + '<br><button class="lic-refresh-btn" onclick="loadLicenseInfo()" style="margin-top:16px"><i class="fas fa-sync-alt"></i> ' + t('license.retry') + '</button></div>';
                return;
            }
            renderLicenseInfo(d);
        })
        .catch(function(e) {
            el.innerHTML = '<div class="lic-error"><i class="fas fa-exclamation-triangle" style="font-size:2rem;margin-bottom:12px;display:block;"></i>' + t('license.conn_error') + '<br><button class="lic-refresh-btn" onclick="loadLicenseInfo()" style="margin-top:16px"><i class="fas fa-sync-alt"></i> ' + t('license.retry') + '</button></div>';
        });
}

function renderLicenseInfo(d) {
    var el = document.getElementById('lic-content');
    var statusClass = 'no_license';
    var statusText = t('license.no_license');
    if (d.status === 'active') { statusClass = 'active'; statusText = t('license.status_active'); }
    else if (d.status === 'grace') { statusClass = 'grace'; statusText = t('license.status_grace'); }
    else if (d.status === 'expired') { statusClass = 'expired'; statusText = t('license.status_expired'); }
    else if (d.status === 'suspended') { statusClass = 'suspended'; statusText = t('license.status_suspended'); }

    var html = '';

    /* ========== KEY HERO CARD ========== */
    html += '<div class="lic-key-hero">';
    html += '<div class="key-label"><i class="fas fa-key"></i> ' + t('license.serial') + '</div>';
    html += '<div class="key-value">';
    html += '<span id="lic-key-text">' + esc(d.license_key || '-') + '</span>';
    html += '<button class="key-copy" onclick="copyKey()"><i class="fas fa-copy"></i> Copy</button>';
    html += '</div>';
    html += '<div class="key-status">';
    html += '<span class="lic-status-badge ' + statusClass + '">' + statusText + '</span>';
    if (d.is_lifetime) {
        html += '<span class="lic-lifetime-badge"><i class="fas fa-infinity"></i> Lifetime</span>';
    } else if (d.days_remaining !== null && d.days_remaining !== undefined) {
        var daysClass = d.days_remaining < 3 ? 'danger' : (d.days_remaining < 7 ? 'warn' : '');
        var daysText = d.days_remaining <= 0 ? t('license.expired') : d.days_remaining + ' ' + t('license.days_remaining');
        html += '<span class="lic-days-badge ' + daysClass + '"><i class="fas fa-clock"></i> ' + daysText + '</span>';
    }
    html += '</div>';
    html += '</div>';

    /* ========== PLAN CARD ========== */
    if (d.plan && d.plan.name && d.plan.name !== 'N/A') {
        html += '<div class="lic-plan-card">';
        html += '<div class="lic-plan-header">';
        html += '<div class="lic-plan-name"><i class="fas fa-crown"></i> ' + esc(d.plan.name) + '</div>';
        html += '<div class="lic-plan-price">';
        if (d.plan.price > 0) html += esc(d.plan.price + ' USD');
        if (d.plan.duration_days > 0) html += ' / ' + d.plan.duration_days + ' ' + t('license.days');
        else html += ' - Lifetime';
        html += '</div>';
        html += '</div>';

        /* Limits */
        var gw = d.plan.max_projects;
        var cl = d.plan.max_licenses;
        var gwText = gw === 0 ? 'Unlimited' : gw;
        var clText = cl === 0 ? 'Unlimited' : cl;
        var gwClass = gw === 0 ? 'unlimited' : '';
        var clClass = cl === 0 ? 'unlimited' : '';

        html += '<div class="lic-plan-limits">';
        html += '<div class="lic-limit-item"><div class="limit-val ' + gwClass + '">' + gwText + '</div><div class="limit-lbl">Gateways</div></div>';
        html += '<div class="lic-limit-item"><div class="limit-val ' + clClass + '">' + clText + '</div><div class="limit-lbl">Clients</div></div>';
        html += '</div>';

        /* Features */
        if (d.plan.features && d.plan.features.length) {
            html += '<ul class="lic-plan-features">';
            d.plan.features.forEach(function(f) {
                html += '<li><i class="fas fa-check-circle"></i> ' + esc(f) + '</li>';
            });
            html += '</ul>';
        }

        html += '</div>';
    }

    /* ========== INFO GRID ========== */
    html += '<div class="lic-info-grid">';

    /* Dates Card */
    html += '<div class="lic-info-card">';
    html += '<div class="lic-card-title"><i class="fas fa-calendar-alt"></i> ' + t('license.dates') + '</div>';
    html += licRow(t('license.activated_at'), esc(d.activated_at || d.created_at || '-'));
    html += licRow(t('license.created_at'), esc(d.created_at || '-'));
    if (d.is_lifetime) {
        html += licRow(t('license.expires_at'), '<span class="green"><i class="fas fa-infinity"></i> ' + t('license.lifetime') + '</span>', true);
    } else {
        html += licRow(t('license.expires_at'), d.expires_at ? '<span class="' + (d.days_remaining !== null && d.days_remaining < 7 ? 'warn' : '') + '">' + esc(d.expires_at) + '</span>' : '-', true);
    }
    if (d.grace_end_at) html += licRow(t('license.grace_end'), '<span class="warn">' + esc(d.grace_end_at) + '</span>', true);
    html += '</div>';

    /* Payments Card */
    html += '<div class="lic-info-card">';
    html += '<div class="lic-card-title"><i class="fas fa-credit-card"></i> ' + t('license.payments') + '</div>';
    if (d.payments && d.payments.length > 0) {
        html += '<div style="overflow-x:auto;"><table class="lic-payments-table"><thead><tr>';
        html += '<th>' + t('license.pay_date') + '</th>';
        html += '<th>' + t('license.pay_amount') + '</th>';
        html += '<th>' + t('license.pay_method') + '</th>';
        html += '<th>' + t('license.pay_status') + '</th>';
        html += '</tr></thead><tbody>';
        for (var j = 0; j < d.payments.length; j++) {
            var p = d.payments[j];
            var pStatus = p.payment_status || 'completed';
            html += '<tr>';
            html += '<td>' + esc(p.payment_date || '-') + '</td>';
            html += '<td style="font-family:monospace;">' + esc((p.amount || 0) + ' ' + (p.currency || 'USD')) + '</td>';
            html += '<td>' + esc(p.payment_method || '-') + '</td>';
            html += '<td><span class="pay-status ' + pStatus + '">' + esc(pStatus) + '</span></td>';
            html += '</tr>';
        }
        html += '</tbody></table></div>';
    } else {
        html += '<div class="lic-empty"><i class="fas fa-receipt" style="font-size:1.5rem;margin-bottom:8px;display:block;opacity:.4;"></i>' + t('license.no_payments') + '</div>';
    }
    html += '</div>';

    html += '</div>'; // lic-info-grid

    /* Renew button */
    if (d.renewal_url && !d.is_lifetime) {
        html += '<div style="text-align:center;margin-top:16px;"><a class="lic-renew-btn" href="' + esc(d.renewal_url) + '" target="_blank"><i class="fas fa-sync-alt"></i> ' + t('license.renew') + '</a></div>';
    }

    el.innerHTML = html;
}

function licRow(label, value, isHtml) {
    return '<div class="lic-row"><span class="label">' + label + '</span><span class="value">' + (isHtml ? value : esc(value)) + '</span></div>';
}

function esc(s) {
    return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function copyKey() {
    var key = document.getElementById('lic-key-text');
    if (!key) return;
    var text = key.textContent;
    var btn = key.nextElementSibling;
    navigator.clipboard.writeText(text).then(function() {
        if (btn) { btn.innerHTML = '<i class="fas fa-check"></i> Copied!'; }
        setTimeout(function() { if (btn) { btn.innerHTML = '<i class="fas fa-copy"></i> Copy'; } }, 1500);
    });
}

loadLicenseInfo();
loadLicenseLimits();

function loadLicenseLimits() {
    fetch('/api/license-limits')
        .then(function(r) { return r.json(); })
        .then(function(data) {
            if (!data || !data.success) return;
            var bar = document.getElementById('license_limits_bar');
            if (!bar) return;
            bar.style.display = 'flex';
            var lim = data.limits;
            var usage = data.usage;

            document.getElementById('limits_plan_name').textContent = lim.plan_name || '\u2014';

            var gwCur = usage.gateways || 0;
            var gwMax = lim.max_projects || 0;
            document.getElementById('limits_gw_current').textContent = gwCur;
            if (gwMax === 0) {
                document.getElementById('limits_gw_max').textContent = '\u221E';
                document.getElementById('limits_gw_max').className = 'limits-unlimited';
                document.getElementById('limits_gw_track').style.display = 'none';
            } else {
                var gwPct = Math.min(100, Math.round((gwCur / gwMax) * 100));
                document.getElementById('limits_gw_max').textContent = '/ ' + gwMax;
                document.getElementById('limits_gw_max').className = '';
                document.getElementById('limits_gw_track').style.display = '';
                var gwFill = document.getElementById('limits_gw_fill');
                gwFill.style.width = gwPct + '%';
                gwFill.className = 'limits-bar-fill' + (gwPct > 80 ? (gwPct >= 100 ? ' over' : ' warn') : '');
            }

            var clCur = usage.clients || 0;
            var clMax = lim.max_licenses || 0;
            document.getElementById('limits_cl_current').textContent = clCur;
            if (clMax === 0) {
                document.getElementById('limits_cl_max').textContent = '\u221E';
                document.getElementById('limits_cl_max').className = 'limits-unlimited';
                document.getElementById('limits_cl_track').style.display = 'none';
            } else {
                var clPct = Math.min(100, Math.round((clCur / clMax) * 100));
                document.getElementById('limits_cl_max').textContent = '/ ' + clMax;
                document.getElementById('limits_cl_max').className = '';
                document.getElementById('limits_cl_track').style.display = '';
                var clFill = document.getElementById('limits_cl_fill');
                clFill.style.width = clPct + '%';
                clFill.className = 'limits-bar-fill' + (clPct > 80 ? (clPct >= 100 ? ' over' : ' warn') : '');
            }
        })
        .catch(function() {
            var bar = document.getElementById('license_limits_bar');
            if (bar) bar.style.display = 'none';
        });
}
</script>
