<style>
    .ts-wrap {
        max-width: 1000px;
        margin: 0 auto;
        padding: 16px;
    }

    .ts-header {
        background: var(--sidebar-bg);
        border: 1px solid var(--mou_border_color);
        border-radius: 20px;
        padding: 16px 24px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
        box-shadow: var(--shadow-md);
    }

    .ts-header h2 {
        color: var(--primary-color);
        font-size: 1.2rem;
        display: flex;
        align-items: center;
        gap: 10px;
    }

    .ts-card {
        background: var(--sidebar-bg);
        border: 1px solid var(--mou_border_color);
        border-radius: 16px;
        padding: 20px;
        box-shadow: var(--shadow-sm);
        margin-bottom: 20px;
    }

    .ts-card h3 {
        color: var(--primary-color);
        font-size: 1rem;
        margin-bottom: 16px;
        display: flex;
        align-items: center;
        gap: 8px;
    }

    .ts-card .form-row {
        display: flex;
        gap: 12px;
        margin-bottom: 12px;
        flex-wrap: wrap;
        align-items: flex-end;
    }

    .ts-card .form-group {
        flex: 1;
        min-width: 200px;
    }

    .ts-card label {
        display: block;
        font-size: 0.8rem;
        color: var(--text-dim);
        font-weight: 500;
    }

    .ts-card input[type="text"],
    .ts-card input[type="url"] {
        width: 100%;
        padding: 10px 14px;
        border-radius: 10px;
        border: 1.5px solid rgba(255, 255, 255, 0.08);
        background: rgba(255, 255, 255, 0.04);
        color: #fff;
        font-family: inherit;
        font-size: 0.9rem;
        transition: border-color 0.3s;
        box-sizing: border-box;
    }

    .ts-card input:focus {
        outline: none;
        border-color: rgba(255, 204, 0, 0.5);
    }

    .btn-save {
        padding: 10px 24px;
        border-radius: 10px;
        border: none;
        font-weight: 700;
        font-size: 0.9rem;
        cursor: pointer;
        transition: all 0.3s;
        font-family: inherit;
        background: linear-gradient(135deg, #ffcc00, #ff9900);
        color: #0b0a02;
        white-space: nowrap;
    }

    .btn-save:hover {
        transform: translateY(-2px);
        box-shadow: 0 4px 15px rgba(255, 204, 0, 0.3);
    }

    .btn-save-sm {
        padding: 8px 18px;
        font-size: 0.85rem;
    }

    .btn-add-provider {
        padding: 10px 20px;
        border-radius: 10px;
        border: 2px dashed rgba(46, 199, 110, 0.5);
        background: rgba(46, 199, 110, 0.08);
        color: #2ec76e;
        font-weight: 700;
        font-size: 0.9rem;
        cursor: pointer;
        transition: all 0.3s;
        font-family: inherit;
        display: flex;
        align-items: center;
        gap: 8px;
    }

    .btn-add-provider:hover {
        background: rgba(46, 199, 110, 0.15);
        border-color: rgba(46, 199, 110, 0.8);
        transform: translateY(-2px);
    }

    .btn-delete-provider {
        padding: 6px 12px;
        border-radius: 8px;
        border: 1px solid rgba(239, 68, 68, 0.3);
        background: rgba(239, 68, 68, 0.08);
        color: #ef4444;
        font-size: 0.8rem;
        cursor: pointer;
        transition: all 0.3s;
        font-family: inherit;
        white-space: nowrap;
    }

    .btn-delete-provider:hover {
        background: rgba(239, 68, 68, 0.2);
        border-color: rgba(239, 68, 68, 0.6);
    }

    .provider-row {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 14px 16px;
        border: 1px solid rgba(255, 255, 255, 0.06);
        border-radius: 12px;
        margin-bottom: 10px;
        background: rgba(255, 255, 255, 0.02);
        transition: background 0.2s;
    }

    .provider-row:hover {
        background: rgba(255, 255, 255, 0.04);
    }

    .provider-info {
        flex: 1;
        min-width: 0;
    }

    .provider-name {
        font-weight: 700;
        font-size: 0.95rem;
        color: var(--text-main);
        margin-bottom: 2px;
    }

    .provider-key {
        font-size: 0.78rem;
        color: var(--text-dim);
        font-family: monospace;
    }

    .toggle-wrap {
        display: flex;
        align-items: center;
        gap: 8px;
        flex-shrink: 0;
    }

    .toggle {
        position: relative;
        width: 44px;
        height: 24px;
        cursor: pointer;
        flex-shrink: 0;
    }

    .toggle input {
        display: none;
    }

    .toggle .slider {
        position: absolute;
        inset: 0;
        background: #555;
        border-radius: 24px;
        transition: 0.3s;
    }

    .toggle .slider:before {
        content: '';
        position: absolute;
        width: 18px;
        height: 18px;
        left: 3px;
        bottom: 3px;
        background: #fff;
        border-radius: 50%;
        transition: 0.3s;
    }

    .toggle input:checked+.slider {
        background: #2ec76e;
    }

    .toggle input:checked+.slider:before {
        transform: translateX(20px);
    }

    .toggle-label {
        font-size: 0.8rem;
        color: var(--text-dim);
        font-weight: 500;
        white-space: nowrap;
    }

    .providers-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 16px;
        flex-wrap: wrap;
        gap: 10px;
    }

    .providers-header h3 {
        margin-bottom: 0;
    }

    .providers-empty {
        text-align: center;
        padding: 30px 20px;
        color: var(--text-dim);
        font-size: 0.9rem;
    }

    .providers-empty i {
        font-size: 2rem;
        margin-bottom: 10px;
        display: block;
        opacity: 0.3;
    }

    .add-provider-form {
        display: none;
        padding: 16px;
        border: 1px dashed rgba(46, 199, 110, 0.3);
        border-radius: 12px;
        margin-bottom: 12px;
        background: rgba(46, 199, 110, 0.04);
    }

    .add-provider-form.active {
        display: block;
    }

    .add-provider-form .form-row {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        align-items: flex-end;
    }

    .add-provider-form .form-group {
        flex: 1;
        min-width: 160px;
    }

    .add-provider-form label {
        display: block;
        margin-bottom: 4px;
        font-size: 0.8rem;
        color: var(--text-dim);
        font-weight: 500;
    }

    .add-provider-form input {
        width: 100%;
        padding: 10px 14px;
        border-radius: 10px;
        border: 1.5px solid rgba(255, 255, 255, 0.08);
        background: rgba(255, 255, 255, 0.04);
        color: #fff;
        font-family: inherit;
        font-size: 0.9rem;
        box-sizing: border-box;
    }

    .add-provider-form input:focus {
        outline: none;
        border-color: rgba(46, 199, 110, 0.5);
    }

    .add-provider-actions {
        display: flex;
        gap: 8px;
        align-items: center;
    }

    .btn-confirm {
        padding: 10px 20px;
        border-radius: 10px;
        border: none;
        font-weight: 700;
        font-size: 0.9rem;
        cursor: pointer;
        transition: all 0.3s;
        font-family: inherit;
        background: linear-gradient(135deg, #2ec76e, #1ea55a);
        color: #fff;
    }

    .btn-confirm:hover {
        transform: translateY(-2px);
        box-shadow: 0 4px 15px rgba(46, 199, 110, 0.3);
    }

    .btn-cancel {
        padding: 10px 16px;
        border-radius: 10px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        background: transparent;
        color: var(--text-dim);
        font-size: 0.9rem;
        cursor: pointer;
        font-family: inherit;
        transition: all 0.3s;
    }

    .btn-cancel:hover {
        border-color: rgba(255, 255, 255, 0.2);
        color: var(--text-main);
    }

    #ts-toast {
        position: fixed;
        bottom: 30px;
        left: 50%;
        transform: translateX(-50%);
        padding: 12px 28px;
        border-radius: 12px;
        font-weight: 600;
        font-size: 0.9rem;
        display: none;
        z-index: 9999999;
        background: #2ec76e;
        color: #fff;
        box-shadow: var(--shadow-toast);
        animation: slideUp 0.3s ease;
    }

    #ts-toast.error {
        background: #ef4444;
    }

    @keyframes slideUp {
        from {
            transform: translateX(-50%) translateY(20px);
            opacity: 0;
        }

        to {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }
    }

    @media (max-width: 600px) {
        .ts-header {
            flex-direction: column;
            gap: 8px;
            text-align: center;
        }

        .provider-row {
            flex-wrap: wrap;
        }

        .add-provider-form .form-row {
            flex-direction: column;
        }
    }
</style>

<div class="ts-wrap">
    <div class="ts-header">
        <h2><i class="fas fa-cog"></i> <span data-i18n="transfer.title">إعدادات عمليات التحويل</span></h2>
    </div>

    <div class="ts-card">
        <div class="providers-header">
            <h3><i class="fas fa-plug"></i> <span data-i18n="transfer.providers">مزودو الخدمة</span></h3>
            <button class="btn-add-provider" onclick="ts_toggleAddForm()"><i class="fas fa-plus"></i> <span
                    data-i18n="transfer.add_provider">إضافة مزود</span></button>
        </div>

        <div id="ts-add-provider-form" class="add-provider-form">
            <div class="form-row">
                <div class="form-group">
                    <label data-i18n="transfer.provider_display_name">اسم المزود</label>
                    <input type="text" id="ts-new-name" placeholder="e.g. e& money">
                </div>
                <div class="form-group">
                    <label data-i18n="transfer.provider_json_key">المفتاح (JSON)</label>
                    <input type="text" id="ts-new-key" placeholder="e.g. etisalat" dir="ltr">
                </div>
                <div class="add-provider-actions">
                    <button class="btn-confirm" onclick="ts_addProvider()"><i class="fas fa-check"></i> <span
                            data-i18n="transfer.confirm_add">إضافة</span></button>
                    <button class="btn-cancel" onclick="ts_toggleAddForm()"><span
                            data-i18n="transfer.cancel">إلغاء</span></button>
                </div>
            </div>
        </div>

        <div id="ts-providers-list">
            <div class="providers-empty">
                <i class="fas fa-plug"></i>
                <span data-i18n="transfer.no_providers">لا يوجد مزودين بعد</span>
            </div>
        </div>
    </div>

    <div class="ts-card">
        <div class="providers-header">
            <h3><i class="fas fa-server"></i> <span data-i18n="transfer.secondary_heading">السيرفرات الخارجية</span>
            </h3>
            <button class="btn-add-provider" onclick="ts_toggleAddServerForm()"><i class="fas fa-plus"></i> <span
                    data-i18n="transfer.add_server">إضافة سيرفر</span></button>
        </div>
        <p style="font-size:0.85rem;color:var(--text-dim);margin-bottom:12px;" data-i18n="transfer.secondary_desc">
            الرسائل هتتبعت لكل السيرفرات المفعلة</p>
        <div class="toggle-wrap" style="margin-bottom:16px;">
            <label class="toggle">
                <input type="checkbox" id="ts-forward-master">
                <span class="slider"></span>
            </label>
            <span class="toggle-label" id="ts-forward-master-label" data-i18n="transfer.enable_secondary">🔴 إرسال
                الرسائل إلى السيرفرات الخارجية (متوقف)</span>
        </div>

        <div id="ts-add-server-form" class="add-provider-form">
            <div class="form-row">
                <div class="form-group">
                    <label data-i18n="transfer.server_name">اسم السيرفر</label>
                    <input type="text" id="ts-srv-name" placeholder="e.g. Production Server">
                </div>
                <div class="form-group">
                    <label data-i18n="transfer.server_url">رابط السيرفر</label>
                    <input type="url" id="ts-srv-url" placeholder="https://example.com/api/incoming-payments/receive"
                        dir="ltr">
                </div>
                <div class="form-group">
                    <label data-i18n="transfer.api_token">مفتاح API (اختياري)</label>
                    <input type="text" id="ts-srv-token" placeholder="Bearer token" dir="ltr">
                </div>
                <div class="add-provider-actions">
                    <button class="btn-confirm" onclick="ts_addServer()"><i class="fas fa-check"></i> <span
                            data-i18n="transfer.confirm_add">إضافة</span></button>
                    <button class="btn-cancel" onclick="ts_toggleAddServerForm()"><span
                            data-i18n="transfer.cancel">إلغاء</span></button>
                </div>
            </div>
        </div>

        <div id="ts-servers-list">
            <div class="providers-empty">
                <i class="fas fa-server"></i>
                <span data-i18n="transfer.no_servers">لا يوجد سيرفرات بعد</span>
            </div>
        </div>
    </div>


</div>

<div id="ts-toast"></div>

<script src="/assets/js/i18n.js"></script>
<script>
    var ts_providers = [];

    function ts_showToast(msg, isError) {
        var toastEl = document.getElementById('ts-toast');
        toastEl.textContent = msg;
        toastEl.className = isError ? 'error' : '';
        toastEl.style.display = 'block';
        setTimeout(function () { toastEl.style.display = 'none'; }, 3000);
    }

    function ts_toggleAddForm() {
        var form = document.getElementById('ts-add-provider-form');
        if (form.classList.contains('active')) {
            form.classList.remove('active');
            document.getElementById('ts-new-name').value = '';
            document.getElementById('ts-new-key').value = '';
        } else {
            form.classList.add('active');
            document.getElementById('ts-new-name').focus();
        }
    }

    function ts_addProvider() {
        var name = document.getElementById('ts-new-name').value.trim();
        var key = document.getElementById('ts-new-key').value.trim();
        if (!name || !key) {
            ts_showToast(t('transfer.fill_all_fields') || 'يرجى ملء جميع الحقول', true);
            return;
        }
        $.ajax({
            url: '/api/transfer-providers',
            type: 'POST',
            contentType: 'application/json',
            data: JSON.stringify({ name: name, provider_key: key }),
            success: function (res) {
                if (res.success) {
                    ts_showToast('✅ ' + (t('transfer.provider_added') || 'تمت إضافة المزود'));
                    ts_toggleAddForm();
                    ts_loadProviders();
                } else {
                    ts_showToast(res.error || 'Error', true);
                }
            },
            error: function (xhr) {
                var msg = 'Error';
                try { msg = JSON.parse(xhr.responseText).error; } catch (e) { }
                ts_showToast(msg, true);
            }
        });
    }

    function ts_loadProviders() {
        $.get('/api/transfer-providers', function (providers) {
            ts_providers = providers || [];
            ts_renderProviders();
        });
    }

    function ts_renderProviders() {
        var container = document.getElementById('ts-providers-list');
        if (!ts_providers.length) {
            container.innerHTML = '<div class="providers-empty"><i class="fas fa-plug"></i><span data-i18n="transfer.no_providers">لا يوجد مزودين بعد</span></div>';
            return;
        }
        var html = '';
        ts_providers.forEach(function (p) {
            var autoFwdLabel = p.auto_forward
                ? '<span style="color:#2ec76e;">●</span> ' + (t('transfer.auto_forward_on') || 'إرسال تلقائي')
                : '<span style="color:#ef4444;">●</span> ' + (t('transfer.auto_forward_off') || 'إرسال يدوي');
            html += '<div class="provider-row" data-id="' + p.id + '">';
            html += '  <div class="provider-info">';
            html += '    <div class="provider-name">' + ts_escapeHtml(p.name) + '</div>';
            html += '    <div class="provider-key">' + ts_escapeHtml(p.provider_key) + '</div>';
            html += '  </div>';
            html += '  <div class="toggle-wrap">';
            html += '    <label class="toggle" title="' + (t('transfer.auto_forward_toggle') || 'تشغيل/إيقاف الإرسال التلقائي') + '">';
            html += '      <input type="checkbox" ' + (p.auto_forward ? 'checked' : '') + ' onchange="ts_toggleAutoForward(' + p.id + ', this.checked)">';
            html += '      <span class="slider"></span>';
            html += '    </label>';
            html += '    <span class="toggle-label">' + autoFwdLabel + '</span>';
            html += '  </div>';
            html += '  <button class="btn-delete-provider" onclick="ts_deleteProvider(' + p.id + ', \'' + ts_escapeHtml(p.name) + '\')" title="' + (t('transfer.delete_provider') || 'حذف المزود') + '"><i class="fas fa-trash-alt"></i></button>';
            html += '</div>';
        });
        container.innerHTML = html;
    }

    function ts_escapeHtml(str) {
        if (!str) return '';
        return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    function ts_toggleAutoForward(id, enabled) {
        $.ajax({
            url: '/api/transfer-providers/' + id,
            type: 'PUT',
            contentType: 'application/json',
            data: JSON.stringify({ auto_forward: enabled }),
            success: function (res) {
                if (res.success) {
                    ts_showToast(enabled
                        ? ('✅ ' + (t('transfer.auto_forward_on') || 'تم تفعيل الإرسال التلقائي'))
                        : ('✅ ' + (t('transfer.auto_forward_off') || 'تم إيقاف الإرسال التلقائي'))
                    );
                    ts_loadProviders();
                }
            },
            error: function () {
                ts_showToast(t('common.error') || 'خطأ', true);
                ts_loadProviders();
            }
        });
    }

    function ts_deleteProvider(id, name) {
        if (!confirm((t('transfer.confirm_delete') || 'هل أنت متأكد من حذف') + ' "' + name + '"?')) return;
        $.ajax({
            url: '/api/transfer-providers/' + id,
            type: 'DELETE',
            success: function (res) {
                if (res.success) {
                    ts_showToast('✅ ' + (t('transfer.provider_deleted') || 'تم حذف المزود'));
                    ts_loadProviders();
                }
            },
            error: function () {
                ts_showToast(t('common.error') || 'خطأ', true);
            }
        });
    }

    function ts_loadTayercash() {
        $.get('/api/etisalat/settings', function (settings) {
            var masterChecked = settings.forward_master_enabled !== false;
            document.getElementById('ts-forward-master').checked = masterChecked;
            document.getElementById('ts-forward-master-label').textContent = masterChecked ? '🟢 ' + (t('transfer.enable_secondary') || 'إرسال إلى السيرفرات الخارجية') : '🔴 ' + (t('transfer.enable_secondary') || 'إرسال إلى السيرفرات الخارجية');
        });
    }

    document.getElementById('ts-forward-master').addEventListener('change', function () {
        var masterEnabled = this.checked;
        $.ajax({
            url: '/api/etisalat/settings',
            type: 'POST',
            contentType: 'application/json',
            data: JSON.stringify({ forward_master_enabled: masterEnabled }),
            success: function () {
                document.getElementById('ts-forward-master-label').textContent = masterEnabled ? '🟢 ' + (t('transfer.enable_secondary') || 'إرسال إلى السيرفرات الخارجية') : '🔴 ' + (t('transfer.enable_secondary') || 'إرسال إلى السيرفرات الخارجية');
                ts_showToast(masterEnabled ? '✅ ' + (t('transfer.forward_enabled') || 'تم تفعيل الإرسال') : '✅ ' + (t('transfer.forward_disabled') || 'تم إيقاف الإرسال'));
            },
            error: function () { ts_showToast(t('common.error') || 'خطأ', true); }
        });
    });

    var ts_servers = [];

    function ts_toggleAddServerForm() {
        var form = document.getElementById('ts-add-server-form');
        if (form.classList.contains('active')) {
            form.classList.remove('active');
            document.getElementById('ts-srv-name').value = '';
            document.getElementById('ts-srv-url').value = '';
            document.getElementById('ts-srv-token').value = '';
        } else {
            form.classList.add('active');
            document.getElementById('ts-srv-name').focus();
        }
    }

    function ts_addServer() {
        var name = document.getElementById('ts-srv-name').value.trim();
        var url = document.getElementById('ts-srv-url').value.trim();
        var token = document.getElementById('ts-srv-token').value.trim();
        if (!name || !url) {
            ts_showToast(t('transfer.fill_all_fields') || 'يرجى ملء جميع الحقول', true);
            return;
        }
        $.ajax({
            url: '/api/forward-servers',
            type: 'POST',
            contentType: 'application/json',
            data: JSON.stringify({ name: name, url: url, token: token }),
            success: function (res) {
                if (res.success) {
                    ts_showToast('✅ ' + (t('transfer.server_added') || 'تمت إضافة السيرفر'));
                    ts_toggleAddServerForm();
                    ts_loadServers();
                } else {
                    ts_showToast(res.error || 'Error', true);
                }
            },
            error: function (xhr) {
                var msg = 'Error';
                try { msg = JSON.parse(xhr.responseText).error; } catch (e) { }
                ts_showToast(msg, true);
            }
        });
    }

    function ts_loadServers() {
        $.get('/api/forward-servers', function (servers) {
            ts_servers = servers || [];
            ts_renderServers();
        });
    }

    function ts_renderServers() {
        var container = document.getElementById('ts-servers-list');
        if (!ts_servers.length) {
            container.innerHTML = '<div class="providers-empty"><i class="fas fa-server"></i><span data-i18n="transfer.no_servers">لا يوجد سيرفرات بعد</span></div>';
            return;
        }
        var html = '';
        ts_servers.forEach(function (s) {
            var statusLabel = s.enabled
                ? '<span style="color:#2ec76e;">●</span> ' + (t('transfer.server_enabled') || 'مفعل')
                : '<span style="color:#ef4444;">●</span> ' + (t('transfer.server_disabled') || 'متوقف');
            html += '<div class="provider-row" data-id="' + s.id + '">';
            html += '  <div class="provider-info">';
            html += '    <div class="provider-name">' + ts_escapeHtml(s.name) + '</div>';
            html += '    <div class="provider-key">' + ts_escapeHtml(s.url) + '</div>';
            html += '  </div>';
            html += '  <div class="toggle-wrap">';
            html += '    <label class="toggle" title="' + (t('transfer.toggle_server') || 'تشغيل/إيقاف السيرفر') + '">';
            html += '      <input type="checkbox" ' + (s.enabled ? 'checked' : '') + ' onchange="ts_toggleServer(' + s.id + ', this.checked)">';
            html += '      <span class="slider"></span>';
            html += '    </label>';
            html += '    <span class="toggle-label">' + statusLabel + '</span>';
            html += '  </div>';
            html += '  <button class="btn-edit-provider" onclick="ts_editServer(' + s.id + ')" title="' + (t('transfer.edit_server') || 'تعديل السيرفر') + '" style="padding:6px 12px;border-radius:8px;border:1px solid rgba(255,204,0,.3);background:rgba(255,204,0,.08);color:#ffcc00;font-size:0.8rem;cursor:pointer;transition:all .3s;font-family:inherit;white-space:nowrap;"><i class="fas fa-edit"></i></button>';
            html += '  <button class="btn-delete-provider" onclick="ts_deleteServer(' + s.id + ', \'' + ts_escapeHtml(s.name) + '\')" title="' + (t('transfer.delete_server') || 'حذف السيرفر') + '"><i class="fas fa-trash-alt"></i></button>';
            html += '</div>';
        });
        container.innerHTML = html;
    }

    function ts_toggleServer(id, enabled) {
        $.ajax({
            url: '/api/forward-servers/' + id,
            type: 'PUT',
            contentType: 'application/json',
            data: JSON.stringify({ enabled: enabled }),
            success: function (res) {
                if (res.success) {
                    ts_showToast(enabled
                        ? ('✅ ' + (t('transfer.server_enabled') || 'تم تفعيل السيرفر'))
                        : ('✅ ' + (t('transfer.server_disabled') || 'تم إيقاف السيرفر'))
                    );
                    ts_loadServers();
                }
            },
            error: function () {
                ts_showToast(t('common.error') || 'خطأ', true);
                ts_loadServers();
            }
        });
    }

    function ts_deleteServer(id, name) {
        if (!confirm((t('transfer.confirm_delete') || 'هل أنت متأكد من حذف') + ' "' + name + '"?')) return;
        $.ajax({
            url: '/api/forward-servers/' + id,
            type: 'DELETE',
            success: function (res) {
                if (res.success) {
                    ts_showToast('✅ ' + (t('transfer.server_deleted') || 'تم حذف السيرفر'));
                    ts_loadServers();
                }
            },
            error: function () {
                ts_showToast(t('common.error') || 'خطأ', true);
            }
        });
    }

    function ts_editServer(id) {
        var srv = ts_servers.find(function (s) { return s.id === id; });
        if (!srv) return;
        var form = document.getElementById('ts-add-server-form');
        form.classList.add('active');
        document.getElementById('ts-srv-name').value = srv.name || '';
        document.getElementById('ts-srv-url').value = srv.url || '';
        document.getElementById('ts-srv-token').value = srv.token || '';
        document.getElementById('ts-srv-name').focus();

        var confirmBtn = form.querySelector('.btn-confirm');
        var origOnclick = confirmBtn.getAttribute('onclick');
        confirmBtn.setAttribute('onclick', 'ts_updateServer(' + id + ')');
        confirmBtn.innerHTML = '<i class="fas fa-save"></i> <span>' + (t('transfer.save') || 'حفظ') + '</span>';

        var cancelBtn = form.querySelector('.btn-cancel');
        var origCancel = cancelBtn.getAttribute('onclick');
        cancelBtn.setAttribute('onclick', 'ts_cancelEdit()');
        form._origConfirm = origOnclick;
        form._origCancel = origCancel;
    }

    function ts_updateServer(id) {
        var name = document.getElementById('ts-srv-name').value.trim();
        var url = document.getElementById('ts-srv-url').value.trim();
        var token = document.getElementById('ts-srv-token').value.trim();
        if (!name || !url) {
            ts_showToast(t('transfer.fill_all_fields') || 'يرجى ملء جميع الحقول', true);
            return;
        }
        $.ajax({
            url: '/api/forward-servers/' + id,
            type: 'PUT',
            contentType: 'application/json',
            data: JSON.stringify({ name: name, url: url, token: token }),
            success: function (res) {
                if (res.success) {
                    ts_showToast('✅ ' + (t('transfer.server_updated') || 'تم تعديل السيرفر'));
                    ts_toggleAddServerForm();
                    ts_resetAddForm();
                    ts_loadServers();
                }
            },
            error: function () {
                ts_showToast(t('common.error') || 'خطأ', true);
            }
        });
    }

    function ts_cancelEdit() {
        ts_toggleAddServerForm();
        ts_resetAddForm();
    }

    function ts_resetAddForm() {
        var form = document.getElementById('ts-add-server-form');
        var confirmBtn = form.querySelector('.btn-confirm');
        var cancelBtn = form.querySelector('.btn-cancel');
        if (form._origConfirm) { confirmBtn.setAttribute('onclick', form._origConfirm); }
        if (form._origCancel) { cancelBtn.setAttribute('onclick', form._origCancel); }
        confirmBtn.innerHTML = '<i class="fas fa-check"></i> <span>' + (t('transfer.confirm_add') || 'إضافة') + '</span>';
    }

    ts_loadProviders();
    ts_loadServers();
    ts_loadTayercash();
</script>
