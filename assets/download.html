<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SMS Gateway - Download</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--primary:#ffcc00;--primary-hover:#ff9900;--bg:#0d0d12;--card:rgba(20,20,26,0.8);--border:rgba(255,255,255,0.06);--text:#fff;--text-sec:#888;--text-muted:#666}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans Arabic','Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px 16px}
.bg{position:fixed;inset:0;background:radial-gradient(ellipse at 50% 0%,rgba(255,204,0,0.06) 0%,transparent 60%),radial-gradient(ellipse at 80% 80%,rgba(100,150,255,0.03) 0%,transparent 50%);z-index:0;pointer-events:none}
.wrap{position:relative;z-index:1;width:100%;max-width:420px}
.card{background:var(--card);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid var(--border);border-radius:24px;padding:36px 28px;text-align:center;box-shadow:0 24px 80px rgba(0,0,0,0.5)}
.app-icon{width:72px;height:72px;background:linear-gradient(135deg,rgba(255,204,0,0.2),rgba(255,204,0,0.05));border:1px solid rgba(255,204,0,0.2);border-radius:20px;display:flex;align-items:center;justify-content:center;margin:0 auto 16px}
.app-icon svg{width:36px;height:36px;fill:var(--primary)}
h1{font-size:1.3rem;font-weight:800;margin-bottom:4px}
.version{color:var(--primary);font-size:.85rem;font-weight:600;margin-bottom:6px}
.subtitle{color:var(--text-sec);font-size:.82rem;line-height:1.5;margin-bottom:28px}
.qr-wrap{display:flex;justify-content:center;margin-bottom:20px}
.qr-wrap canvas,.qr-wrap img{border-radius:12px;border:2px solid var(--border)}
.url-box{background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:12px;padding:10px 14px;margin-bottom:20px;direction:ltr;text-align:center}
.url-box .url-text{color:var(--text-sec);font-size:.78rem;font-family:'Courier New',monospace;word-break:break-all;user-select:all}
.download-btn{display:inline-flex;align-items:center;gap:10px;padding:14px 32px;border-radius:14px;border:none;background:linear-gradient(135deg,var(--primary),var(--primary-hover));color:#000;font-family:inherit;font-size:.95rem;font-weight:700;cursor:pointer;transition:all .25s;text-decoration:none;box-shadow:0 6px 24px rgba(255,204,0,0.25)}
.download-btn:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(255,204,0,0.35)}
.download-btn:active{transform:translateY(0)}
.download-btn svg{width:20px;height:20px;fill:#000}
.fade-in{animation:fadeIn .4s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@media(max-width:400px){.card{padding:28px 18px}h1{font-size:1.1rem}}
</style>
</head>
<body>
<div class="bg"></div>
<div class="wrap">
<div class="card fade-in">
<div class="app-icon">
<svg viewBox="0 0 24 24" fill="var(--primary)"><path d="M6 18c0 .55.45 1 1 1h1v3.5c0 .83.67 1.5 1.5 1.5s1.5-.67 1.5-1.5V19h2v3.5c0 .83.67 1.5 1.5 1.5s1.5-.67 1.5-1.5V19h1c.55 0 1-.45 1-1V8H6v10zM3.5 8C2.67 8 2 8.67 2 9.5v7c0 .83.67 1.5 1.5 1.5S5 17.33 5 16.5v-7C5 8.67 4.33 8 3.5 8zm17 0c-.83 0-1.5.67-1.5 1.5v7c0 .83.67 1.5 1.5 1.5s1.5-.67 1.5-1.5v-7c0-.83-.67-1.5-1.5-1.5zm-4.97-5.84l1.3-1.3c.2-.2.2-.51 0-.71-.2-.2-.51-.2-.71 0l-1.48 1.48C13.85 1.23 12.95 1 12 1c-.96 0-1.86.23-2.66.63L7.85.15c-.2-.2-.51-.2-.71 0-.2.2-.2.51 0 .71l1.31 1.31C6.97 3.26 6 5.01 6 7h12c0-1.99-.97-3.75-2.47-4.84zM10 5H9V4h1v1zm5 0h-1V4h1v1z"/></svg>
</div>
<h1>SMS Gateway</h1>
<p class="version">v1.0</p>
<p class="subtitle">حمّل تطبيق SMS Gateway على جهازك</p>
<div class="qr-wrap"><div id="qr-box"></div></div>
<div class="url-box"><span class="url-text" id="dl-url"></span></div>
<a class="download-btn" id="dl-btn" href="#" download>
<svg viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
<span>تحميل APK</span>
</a>
</div>
</div>
<script src="/assets/js/qrcode.min.js"></script>
<script>
(function(){
fetch('/local-ip').then(function(r){return r.json()}).then(function(d){
  var url='https://'+d.ip+':'+d.port+'/assets/apk/SMS-Gateway-1.0.apk';
  document.getElementById('dl-url').textContent=url;
  document.getElementById('dl-btn').href=url;
  var el=document.getElementById('qr-box');
  try{new QRCode(el,{text:url,width:180,height:180,colorDark:'#1a1a24',colorLight:'#ffffff',correctLevel:QRCode.CorrectLevel.M});}catch(e){}
}).catch(function(){
  var url=location.origin+'/assets/apk/SMS-Gateway-1.0.apk';
  document.getElementById('dl-url').textContent=url;
  document.getElementById('dl-btn').href=url;
  var el=document.getElementById('qr-box');
  try{new QRCode(el,{text:url,width:180,height:180,colorDark:'#1a1a24',colorLight:'#ffffff',correctLevel:QRCode.CorrectLevel.M});}catch(e){}
});
})();
</script>
</body>
</html>
