<!DOCTYPE html>
<html lang="en" dir="ltr" id="install-html">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title data-i18n="install.title">تنصيب النظام - SMS Gateway</title>
  <link rel="stylesheet" href="assets/fonts/font-awesome/css/all.min.css">
  <link rel="stylesheet" href="assets/css/root.css">
  <script>(function(){var t=localStorage.getItem('theme')||'dark';document.documentElement.className=document.documentElement.className.replace(/\b(dark|light)\b/g,'').trim();document.documentElement.classList.add(t)})();</script>
  <style>
    html {
      background-color: #0d0d0e !important;
      background: #0d0d0e !important;
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Noto Sans Arabic', 'Segoe UI', Tahoma, sans-serif;
      background: radial-gradient(circle at center, #1c1808 0%, #0d0d0e 80%) !important;
      color: #f5f5f7 !important;
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100vh;
      overflow: hidden;
      position: relative;
    }

    .bg-glow-1 {
      position: absolute;
      width: 250px;
      height: 250px;
      background: radial-gradient(circle, rgba(255, 204, 0, 0.15) 0%, transparent 70%) !important;
      top: 20%;
      left: 15%;
      z-index: 1;
      filter: blur(40px);
      animation: floatGlow 8s infinite alternate ease-in-out;
    }

    .bg-glow-2 {
      position: absolute;
      width: 300px;
      height: 300px;
      background: radial-gradient(circle, rgba(76, 175, 80, 0.12) 0%, transparent 70%) !important;
      bottom: 15%;
      right: 10%;
      z-index: 1;
      filter: blur(50px);
      animation: floatGlow 10s infinite alternate-reverse ease-in-out;
    }

    @keyframes floatGlow {
      0% { transform: translateY(0) scale(1); }
      100% { transform: translateY(-20px) scale(1.1); }
    }

    .install-container {
      background-color: rgba(18, 18, 20, 0.75) !important;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      padding: 35px 30px;
      border-radius: 24px;
      border: 1px solid rgba(255, 204, 0, 0.15) !important;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6), inset 0 1px 2px rgba(255, 255, 255, 0.05);
      width: 90%;
      max-width: 400px;
      text-align: center;
      z-index: 10;
      transition: all 0.3s ease;
    }

    .install-container:hover {
      border-color: rgba(255, 204, 0, 0.3) !important;
      box-shadow: 0 25px 60px rgba(255, 204, 0, 0.05), 0 20px 50px rgba(0, 0, 0, 0.7);
    }

    .logo-section {
      margin-bottom: 30px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .logo-img {
      width: 72px;
      height: 72px;
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      background: linear-gradient(135deg, #ffcc00, #ff9900);
      color: #0b0a02;
      border: 2px solid rgba(255, 204, 0, 0.6);
      box-shadow: 0 8px 24px rgba(255, 204, 0, 0.3);
      animation: logoPulse 4s infinite alternate;
    }

    @keyframes logoPulse {
      0% { transform: scale(1); box-shadow: 0 8px 24px rgba(255, 204, 0, 0.25); }
      100% { transform: scale(1.05); box-shadow: 0 12px 30px rgba(255, 204, 0, 0.45); }
    }

    .app-name {
      font-size: 1.6rem;
      font-weight: 800;
      margin: 0;
      letter-spacing: 0.5px;
      background: linear-gradient(135deg, #ffffff 30%, #e0e0e0 70%, #ffcc00 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .app-tagline {
      font-size: 0.8rem;
      color: #9e9e9e !important;
      margin: -5px 0 0 0;
      letter-spacing: 0.5px;
    }

    .setup-title {
      font-size: 1.1rem;
      font-weight: 700;
      color: #ffcc00;
      margin: 0 0 20px 0;
      padding-bottom: 15px;
      border-bottom: 1px solid rgba(255, 204, 0, 0.1);
    }

    .setup-step {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
      text-align: right;
      font-size: 0.85rem;
      color: #b0b0b0;
    }

    .setup-step .step-icon {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      font-weight: 700;
      background: rgba(255, 204, 0, 0.1);
      color: #ffcc00;
      border: 1px solid rgba(255, 204, 0, 0.2);
      flex-shrink: 0;
    }

    .input-group {
      margin-bottom: 20px;
      text-align: right;
    }

    .input-group label {
      display: block;
      margin-bottom: 8px;
      font-size: 13px;
      font-weight: 500;
      color: #d1d1d6 !important;
      padding-right: 4px;
    }

    .input-wrapper {
      position: relative;
      display: flex;
      align-items: center;
    }

    .input-wrapper i {
      position: absolute;
      right: 14px;
      color: #777;
      font-size: 1.1rem;
      transition: color 0.3s;
    }

    .input-wrapper input {
      width: 100%;
      padding: 13px 45px 13px 15px;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.08) !important;
      background-color: rgba(255, 255, 255, 0.04) !important;
      color: white !important;
      box-sizing: border-box;
      outline: none;
      font-size: 0.95rem;
      transition: all 0.3s ease;
      font-family: inherit;
    }

    .input-wrapper input:focus {
      border-color: rgba(255, 204, 0, 0.6) !important;
      background-color: rgba(255, 255, 255, 0.07) !important;
      box-shadow: 0 0 12px rgba(255, 204, 0, 0.15) !important;
    }

    .input-wrapper input:focus + i {
      color: #ffcc00 !important;
    }

    button[type="submit"] {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      border: none;
      background: linear-gradient(135deg, #ffcc00, #ff9900) !important;
      color: #0b0a02 !important;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 4px 15px rgba(255, 204, 0, 0.2);
      font-family: inherit;
      margin-top: 5px;
    }

    button[type="submit"]:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(255, 204, 0, 0.4);
      opacity: 0.95;
    }

    button[type="submit"]:active {
      transform: translateY(1px);
    }

    button[type="submit"]:disabled {
      opacity: 0.7;
      cursor: not-allowed;
      transform: none;
    }

    #error-msg {
      background-color: rgba(239, 68, 68, 0.1) !important;
      border: 1px solid rgba(239, 68, 68, 0.2) !important;
      color: #ef4444 !important;
      font-size: 13px;
      font-weight: 500;
      padding: 10px 12px;
      border-radius: 10px;
      margin-top: 20px;
      display: none;
      align-items: center;
      justify-content: center;
      gap: 8px;
      animation: shakeError 0.4s ease;
    }

    #success-msg {
      background-color: rgba(76, 175, 80, 0.1) !important;
      border: 1px solid rgba(76, 175, 80, 0.2) !important;
      color: #4caf50 !important;
      font-size: 13px;
      font-weight: 500;
      padding: 14px 12px;
      border-radius: 10px;
      margin-top: 20px;
      display: none;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    @keyframes shakeError {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-6px); }
      75% { transform: translateX(6px); }
    }

    *,
    ::after,
    ::before {
      box-sizing: border-box;
    }

    .mask-password {
      -webkit-text-security: disc !important;
      text-security: disc !important;
    }

    input:-webkit-autofill,
    input:-webkit-autofill:hover,
    input:-webkit-autofill:focus {
      -webkit-box-shadow: 0 0 0px 1000px #1c1c1e inset !important;
      -webkit-text-fill-color: white !important;
      transition: background-color 5000s ease-in-out 0s;
    }

    .install-footer {
      margin-top: 20px;
      font-size: 0.75rem;
      color: #666;
    }
  </style>
</head>

<body>
  <div class="bg-glow-1"></div>
  <div class="bg-glow-2"></div>

  <div class="install-container">
    <div class="logo-section">
      <div class="logo-img">
        <i class="fas fa-sms"></i>
      </div>
      <h1 class="app-name">SMS Gateway</h1>
      <p class="app-tagline" data-i18n="install.tagline">بوابة الرسائل الإلكترونية والجهاز</p>
    </div>

    <div class="setup-title">
      <i class="fas fa-cog"></i> <span data-i18n="install.heading">تنصيب النظام لهذا الخادم</span>
    </div>

    <div class="setup-step">
      <div class="step-icon"><i class="fas fa-check"></i></div>
      <span data-i18n="install.found">لقد وجدنا جهازك مُثبَّت على هذا الخادم</span>
    </div>

    <form id="install-form" autocomplete="off">
      <div class="input-group">
        <label for="username" data-i18n="install.username">اسم المستخدم</label>
        <div class="input-wrapper">
          <input type="text" id="username" data-i18n-placeholder="install.username_placeholder" placeholder="اكتب اسم المستخدم" required autocomplete="off">
          <i class="fas fa-user"></i>
        </div>
      </div>

      <div class="input-group">
        <label for="email" data-i18n="install.email">البريد الإلكتروني</label> <span style="color:#777;font-size:12px;" data-i18n="common.optional">(اختياري)</span>
        <div class="input-wrapper">
          <input type="email" id="email" placeholder="admin@example.com" autocomplete="off">
          <i class="fas fa-envelope"></i>
        </div>
      </div>

      <div class="input-group">
        <label for="password" data-i18n="install.password">كلمة المرور</label>
        <div class="input-wrapper">
          <input type="text" id="password" class="mask-password" data-i18n-placeholder="install.password_placeholder" placeholder="(6 أحرف على الأقل)" required autocomplete="new-password">
          <i class="fas fa-lock"></i>
        </div>
      </div>

      <div class="input-group">
        <label for="confirm-password" data-i18n="install.confirm_password">تأكيد كلمة المرور</label>
        <div class="input-wrapper">
          <input type="text" id="confirm-password" class="mask-password" placeholder="••••••••" required autocomplete="new-password">
          <i class="fas fa-check-circle"></i>
        </div>
      </div>

      <button type="submit" id="submit-btn"><i class="fas fa-rocket"></i> <span data-i18n="install.submit">تثبيت</span></button>
      <div id="error-msg"><i class="fas fa-exclamation-circle"></i> <span></span></div>
      <div id="success-msg"><i class="fas fa-check-circle"></i> <span></span></div>
    </form>

    <div class="install-footer">
      <i class="fas fa-shield-alt"></i> <span data-i18n="install.info">سيتم حماية هذا الجهاز ببروتوكول</span>
    </div>
  </div>

  <script src="/assets/js/i18n.js"></script>
  <script>
    document.getElementById('install-form').onsubmit = async (e) => {
      e.preventDefault();
      const submitBtn = document.getElementById('submit-btn');
      const usernameInput = document.getElementById('username');
      const emailInput = document.getElementById('email');
      const passwordInput = document.getElementById('password');
      const confirmInput = document.getElementById('confirm-password');
      const errorMsg = document.getElementById('error-msg');
      const successMsg = document.getElementById('success-msg');

      errorMsg.style.display = 'none';
      successMsg.style.display = 'none';

      const password = passwordInput.value;
      const confirm = confirmInput.value;

      if (password !== confirm) {
        errorMsg.querySelector('span').textContent = t('install.error_nomatch');
        errorMsg.style.display = 'flex';
        return;
      }

      if (password.length < 6) {
        errorMsg.querySelector('span').textContent = t('install.error_short');
        errorMsg.style.display = 'flex';
        return;
      }

      submitBtn.disabled = true;
      submitBtn.innerHTML = t('install.installing') + ' <i class="fas fa-circle-notch fa-spin"></i>';
      usernameInput.disabled = true;
      emailInput.disabled = true;
      passwordInput.disabled = true;
      confirmInput.disabled = true;

      try {
        const response = await fetch('/api/setup/install', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username: usernameInput.value,
            password: passwordInput.value,
            email: emailInput.value
          })
        });

        const data = await response.json();

        if (data.success) {
          successMsg.querySelector('span').textContent = t('install.success');
          successMsg.style.display = 'flex';
          submitBtn.innerHTML = '<i class="fas fa-check"></i> ' + t('install.done');
          setTimeout(() => {
            window.location.href = '/login';
          }, 1500);
        } else {
          errorMsg.querySelector('span').textContent = data.error || t('install.failed');
          errorMsg.style.display = 'flex';
          submitBtn.disabled = false;
          submitBtn.innerHTML = '<i class="fas fa-rocket"></i> ' + t('install.retry');
          usernameInput.disabled = false;
          emailInput.disabled = false;
          passwordInput.disabled = false;
          confirmInput.disabled = false;
        }
      } catch (err) {
        errorMsg.querySelector('span').textContent = t('install.error_network');
        errorMsg.style.display = 'flex';
        submitBtn.disabled = false;
        submitBtn.innerHTML = '<i class="fas fa-rocket"></i> ' + t('install.retry');
        usernameInput.disabled = false;
        emailInput.disabled = false;
        passwordInput.disabled = false;
        confirmInput.disabled = false;
      }
    };
  </script>
</body>

</html>
